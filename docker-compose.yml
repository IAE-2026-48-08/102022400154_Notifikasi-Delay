version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifikasi_delay_app
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - .:/var/www
      - ./database/database.sqlite:/var/www/database/database.sqlite
      - vendor_data:/var/www/vendor
    environment:
      APP_NAME: "Notifikasi Delay"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8001
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    networks:
      - notifikasi_network

networks:
  notifikasi_network:
    driver: bridge

volumes:
  vendor_data: